name: AlloyDB
enabled: true
aliases:
  - AlloyDB
  - google_alloydb
resources:
  - google_alloydb_cluster
  - google_alloydb_instance
module_paths:
  - modules/alloydb
policy_allowed: true
relevance_topics:
  - AlloyDB cluster
  - AlloyDB CMEK
# Optional: a product can declare its own feed. When set, Ingest
# fetches this in addition to the shared cloud feed. Omit to use only the
# shared RELEASE_FEED_URL and match by aliases.
feed_url: ""        # e.g. https://cloud.google.com/feeds/alloydb-release-notes.xml
feed_format: auto   # auto | atom | rss
