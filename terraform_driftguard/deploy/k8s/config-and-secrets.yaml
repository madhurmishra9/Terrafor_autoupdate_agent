apiVersion: v1
kind: Namespace
metadata:
  name: terraform-driftguard
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: terraform-driftguard-ksa
  namespace: terraform-driftguard
  annotations:
    # Workload Identity binding to a GSA with Cloud SQL Client + Vertex AI User.
    iam.gke.io/gcp-service-account: terraform-driftguard-gsa@PROJECT.iam.gserviceaccount.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: terraform-driftguard-config
  namespace: terraform-driftguard
data:
  GOOGLE_CLOUD_PROJECT: "my-gcp-project"
  VERTEX_LOCATION: "us-central1"
  VERTEX_MODEL: "gemini-2.5-pro"
  CLOUDSQL_DATABASE: "terraform_driftguard"
  CLOUDSQL_INSTANCE_CONNECTION_NAME: "my-gcp-project:us-central1:terraform-driftguard-pg"
  JIRA_BASE_URL: "https://your-domain.atlassian.net"
  JIRA_EMAIL: "automation@your-domain.com"
  JIRA_PROJECT_KEY: "PROJ"
  GITHUB_API_BASE: "https://api.github.com"
  GITHUB_REPO_OWNER: "my-org"
  GITHUB_REPO_NAME: "terraform-modules"
  GITHUB_AUTH_MODE: "pat"
  GITHUB_APP_ID: ""
  GITHUB_APP_INSTALLATION_ID: ""
---
# Secret values are placeholders. In production, prefer External Secrets /
# Secret Manager CSI driver over committing these.
apiVersion: v1
kind: Secret
metadata:
  name: terraform-driftguard-secrets
  namespace: terraform-driftguard
type: Opaque
stringData:
  CLOUDSQL_USER: "terraform_driftguard"
  CLOUDSQL_PASSWORD: "REPLACE_ME"
  JIRA_API_TOKEN: "REPLACE_ME"
  GITHUB_PAT: "REPLACE_ME"
---
# GitHub App private key (only when GITHUB_AUTH_MODE=app). Mount as a file.
apiVersion: v1
kind: Secret
metadata:
  name: github-app-key
  namespace: terraform-driftguard
type: Opaque
stringData:
  private-key.pem: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_YOUR_GITHUB_APP_PRIVATE_KEY
    -----END RSA PRIVATE KEY-----
